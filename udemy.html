<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>マラソン申し込みフォーム</h1>
    
    <form action="">
    <label for="sei">姓</label>
    <input type="text" id="sei" name="sei" placeholder="姓" required>
    <label for="mei">名</label>
    <input type="text" id="mei" name="mei" placeholder="名" required>
    
    <p>
    参加するマラソンを選択：
    </p>
    <input type="radio" name="funrun" id="race" value="funrun">
    <label for="race">楽しく走ろう5km</label>
    <br>
    <input type="radio" name="funrun" id="half" value="half">
    <label for="half">ハーフマラソン</label>
    <br>
    <input type="radio" name="funrun" id="full" value="full">
    <label for="full">フルマラソン</label>
    <br>
    <p>
    <label for="e-mail">メールアドレス</label>
    <input type="email" name="adress" id="e-mail"   required>
    <label for="pass">パスワード</label>
    <input type="password" name="pass" id="pass" minlength="5" maxlength="15">
    </p>
    <p>
        <label for="age">参加する年代</label>
        <select name="division" id="age">
            <option value="kids">18歳未満</option>
            <option value="ya">18-30</option>
            <option value="adults">30-50</option>
            <option value="senior">50歳以上</option>
        </select>
    </p>
    <button>登録する</button>
    </form>
    
</body>
</html>
